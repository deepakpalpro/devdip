global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Scrape the Spring Boot host from inside Docker (Mac/Win Docker Desktop).
  - job_name: banking-forms-platform
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["__SCRAPE_HOST__:8080"]
