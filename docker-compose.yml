# Local dev integrations for the Banking Forms Platform.
#
# Services:
#   ollama      :11434  — LLM runtime (llava + llama3.2 pulled on first start)
#   kafka       :9092   — event bus (topic: submissions.processed)
#   localstack  :4566   — AWS S3 emulator (bucket: banking-forms-submissions)
#   mcp-server  :3100   — MCP agent bridge (profile: mcp)
#
# Optional observability profile (Prometheus + Grafana):
#   docker compose --profile observability up -d
#
# First start note: Ollama model pulls can take several minutes and require ~8 GB disk.

name: banking-forms-platform

services:
  ollama:
    image: ollama/ollama:0.6.5
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  # Pulls models required by ollama-vision (llava) and OllamaAiEvaluator (llama3.2).
  ollama-init:
    image: ollama/ollama:0.6.5
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODELS: ${OLLAMA_MODELS:-llava llama3.2}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        for model in $$OLLAMA_MODELS; do
          if ollama list | grep -q "$$model"; then
            echo "Model $$model already present — skipping pull"
          else
            echo "Pulling $$model (this may take several minutes)..."
            ollama pull "$$model"
          fi
        done
        echo "Ollama models ready:"
        ollama list
    restart: "no"

  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  kafka-init:
    image: apache/kafka:3.9.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic submissions.processed --partitions 1 --replication-factor 1
        echo "Kafka topics:"
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list
    restart: "no"

  localstack:
    image: localstack/localstack:4.4
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: us-east-1
      DEBUG: ${LOCALSTACK_DEBUG:-0}
    volumes:
      - ./localstack/init:/etc/localstack/init/ready.d:ro
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s
    restart: unless-stopped

  # Echo server for rest-webhook downstream UAT (logs POST bodies to docker logs).
  webhook-sink:
    image: mendhak/http-https-echo:33
    ports:
      - "8099:8080"
    environment:
      HTTP_PORT: 8080
    restart: unless-stopped

  mcp-server:
    build: ./mcp-server
    profiles: [mcp]
    ports:
      - "3100:3100"
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_PORT: "3100"
      MCP_API_KEY: ${MCP_API_KEY:-dev-mcp-key}
      BANKING_API_URL: http://host.docker.internal:8080
      BANKING_TENANT_ID: ${BANKING_TENANT_ID:-11111111-1111-1111-1111-111111111111}
      BANKING_USER_ID: ${BANKING_USER_ID:-44444444-4444-4444-4444-444444444444}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: [observability]
    ports:
      - "9090:9090"
    environment:
      SCRAPE_HOST: ${PROMETHEUS_SCRAPE_HOST:-host.docker.internal}
    volumes:
      - ./prometheus/prometheus.template.yml:/etc/prometheus/prometheus.template.yml:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sed "s/__SCRAPE_HOST__/$${SCRAPE_HOST}/g" /etc/prometheus/prometheus.template.yml > /etc/prometheus/prometheus.yml
        exec /bin/prometheus --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    profiles: [observability]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  ollama_data:
  kafka_data:
  localstack_data:
